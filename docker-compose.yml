services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: top_academy_backend
    restart: unless-stopped
    ports:
      - '8080:8080'
    volumes:
      - ./backend/.env:/app/.env
      - ./backend/data:/app/data
    environment:
      - DB_PATH=/app/data/journal_bot.db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: top_academy_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    depends_on:
      - backend
